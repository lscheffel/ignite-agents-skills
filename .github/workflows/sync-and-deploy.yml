name: Sync Index and Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "skills/**"

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync skills/index.json
        run: |
          chmod +x scripts/sync-index.sh
          ./scripts/sync-index.sh

      - name: Validate skills/index.json
        run: |
          chmod +x scripts/validate-index.sh
          ./scripts/validate-index.sh

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes in index.json
        id: changes
        run: |
          if git diff --quiet skills/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes in skills/index.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes detected in skills/index.json"
          fi

      - name: Commit and push to master
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add skills/index.json
          git commit -m "chore: sync skills/index.json [skip ci]"
          git push origin master
          echo "✅ Changes committed and pushed to master"

      - name: Checkout gh-pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Merge master to gh-pages
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git merge origin/master --strategy=ours --allow-unrelated-histories --no-edit
          git push origin gh-pages
          echo "✅ gh-pages updated with latest changes"
