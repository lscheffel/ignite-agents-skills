name: Sync Pages

on:
  push:
    branches: [master]
    paths:
      - "skills/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          path: master

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync skills/index.json from filesystem
        run: ./master/scripts/sync-index.sh
        working-directory: master

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Check for changes
        id: changes
        run: |
          if diff -q master/skills/index.json gh-pages/skills/index.json > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes in skills/index.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changes detected in skills/index.json"
          fi

      - name: Update and push gh-pages
        if: steps.changes.outputs.changed == 'true'
        run: |
          cp master/skills/index.json gh-pages/skills/index.json
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/index.json
          git commit -m "chore: sync skills/index.json [skip ci]"
          git push origin gh-pages
          echo "✅ gh-pages updated"
